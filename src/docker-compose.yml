services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opentube_insights}
      POSTGRES_USER: ${POSTGRES_USER:-opentube_insights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentube_insights}
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-opentube_insights} -d $${POSTGRES_DB:-opentube_insights}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,api}
      DATABASE_ENGINE: postgresql
      POSTGRES_DB: ${POSTGRES_DB:-opentube_insights}
      POSTGRES_USER: ${POSTGRES_USER:-opentube_insights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentube_insights}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OPENTUBE_DEFAULT_OWNER_USERNAME: ${OPENTUBE_DEFAULT_OWNER_USERNAME:-local-researcher}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    command: >
      sh -c "python manage.py migrate &&
             gunicorn -c gunicorn.conf.py opentube_insights_api.wsgi:application"
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: ./ui
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8000}
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "${UI_HOST_BIND:-127.0.0.1}:${UI_HOST_PORT:-5173}:5173"
    volumes:
      - ./ui:/app
      - ui-node-modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  web:
    image: nginx:1.30.3-alpine
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_started

volumes:
  postgres-data:
  ui-node-modules:
